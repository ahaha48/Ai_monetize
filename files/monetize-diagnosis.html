<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIマネタイズ 適性診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7ff;--white:#fff;--navy:#1a1f4e;--navy2:#2d3470;
  --blue:#3b5bdb;--blue-l:#eef2ff;--blue-m:#748ffc;
  --green:#2f9e44;--green-l:#ebfbee;
  --orange:#e8590c;--orange-l:#fff4e6;
  --pink:#c2255c;--pink-l:#fff0f6;
  --teal:#0c8599;--teal-l:#e3fafc;
  --yellow:#e67700;--yellow-l:#fff9db;
  --purple:#6741d9;--purple-l:#f3f0ff;
  --red:#c92a2a;
  --gold:#f59f00;--gold-l:#fff3cd;
  --indigo:#364fc7;--indigo-l:#e8ecff;
  --text:#1a1f4e;--text2:#495057;--text3:#868e96;
  --border:#dee2e6;
  --sh:0 2px 12px rgba(26,31,78,.08);
  --sh2:0 8px 32px rgba(26,31,78,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
#app{max-width:720px;margin:0 auto;padding:28px 16px 100px}

/* ── Header ── */
.site-header{text-align:center;margin-bottom:36px}
.site-logo{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;font-size:12px;font-weight:700;letter-spacing:.1em;padding:5px 16px;border-radius:100px;margin-bottom:18px}
.site-title{font-family:'Poppins','Noto Sans JP',sans-serif;font-size:clamp(20px,5vw,30px);font-weight:800;color:var(--navy);line-height:1.25;margin-bottom:10px}
.site-title em{color:var(--blue);font-style:normal}
.site-sub{font-size:13px;color:var(--text2);max-width:480px;margin:0 auto;line-height:1.8}

/* ── Phase indicator ── */
.phase-bar{display:flex;gap:0;margin-bottom:28px;border-radius:14px;overflow:hidden;border:1.5px solid var(--border)}
.phase-step{flex:1;padding:12px 8px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);background:var(--white);transition:all .3s;border-right:1px solid var(--border);cursor:default}
.phase-step:last-child{border-right:none}
.phase-step .ps-num{width:22px;height:22px;border-radius:50%;background:var(--border);color:var(--text3);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 4px}
.phase-step.active{background:var(--blue-l);color:var(--navy)}
.phase-step.active .ps-num{background:var(--blue);color:#fff}
.phase-step.done{background:#f8f9ff;color:var(--text2)}
.phase-step.done .ps-num{background:var(--green);color:#fff}

/* ── Cards ── */
.card{background:var(--white);border-radius:20px;padding:28px;box-shadow:var(--sh);margin-bottom:16px}

/* ── Intro ── */
.intro-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0 24px}
@media(max-width:480px){.intro-grid{grid-template-columns:1fr}}
.intro-box{background:var(--blue-l);border-radius:14px;padding:16px 12px;text-align:center}
.intro-box .ico{font-size:24px;margin-bottom:6px}
.intro-box h4{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:3px}
.intro-box p{font-size:11px;color:var(--text2);line-height:1.5}
.notice{background:var(--yellow-l);border:1.5px solid #ffd43b;border-radius:12px;padding:12px 16px;display:flex;gap:10px;align-items:flex-start;margin-bottom:22px;font-size:13px;color:var(--text2);line-height:1.7}

/* ── Progress ── */
.progress-wrap{margin-bottom:24px}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-label{font-size:13px;font-weight:700;color:var(--navy)}
.progress-pct{font-size:13px;color:var(--blue);font-weight:700}
.progress-track{height:8px;background:var(--border);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.pf-cw{background:linear-gradient(90deg,var(--blue),var(--blue-m))}
.pf-stock{background:linear-gradient(90deg,var(--green),#51cf66)}
.step-dots{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.step-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .2s}
.step-dot.done{background:var(--blue)}
.step-dot.current{background:var(--blue-m);transform:scale(1.3)}
.step-dot.done-stock{background:var(--green)}
.step-dot.current-stock{background:#51cf66;transform:scale(1.3)}

/* ── Question ── */
.q-card{background:var(--white);border-radius:20px;padding:28px;box-shadow:var(--sh);margin-bottom:14px;animation:popIn .35s cubic-bezier(.4,0,.2,1)}
@keyframes popIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.q-badge{display:inline-block;color:#fff;font-size:11px;font-weight:700;letter-spacing:.1em;padding:3px 12px;border-radius:100px;margin-bottom:12px}
.q-badge-cw{background:var(--blue)}
.q-badge-stock{background:var(--green)}
.q-section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:4px}
.q-text{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:6px;line-height:1.55}
.q-hint{font-size:12px;color:var(--text3);margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:center;gap:12px;background:var(--bg);border:2px solid var(--border);border-radius:13px;padding:13px 16px;cursor:pointer;transition:all .18s;text-align:left;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;line-height:1.55;width:100%}
.opt:hover{border-color:var(--blue-m);background:var(--blue-l);transform:translateX(3px)}
.opt.sel{border-color:var(--blue);background:var(--blue-l);color:var(--navy)}
.opt.sel-stock{border-color:var(--green);background:var(--green-l);color:var(--navy)}
.opt-letter{width:28px;height:28px;border-radius:50%;background:var(--white);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text3);flex-shrink:0;transition:all .18s}
.opt.sel .opt-letter{background:var(--blue);border-color:var(--blue);color:#fff}
.opt.sel-stock .opt-letter{background:var(--green);border-color:var(--green);color:#fff}
.nav-row{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-top:4px}
.btn-back{background:var(--white);border:2px solid var(--border);color:var(--text2);border-radius:12px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .18s}
.btn-back:hover{border-color:var(--text2)}
.btn-next{flex:1;border:none;color:#fff;border-radius:12px;padding:14px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .18s;opacity:.3;pointer-events:none}
.btn-next-cw{background:var(--blue)}
.btn-next-stock{background:var(--green)}
.btn-next.on{opacity:1;pointer-events:all}
.btn-next.on:hover{transform:translateY(-2px)}

/* ── Transition screen ── */
.trans-screen{text-align:center;padding:48px 24px;background:var(--white);border-radius:20px;box-shadow:var(--sh);animation:popIn .4s ease}
.trans-icon{font-size:56px;margin-bottom:20px}
.trans-h{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:12px}
.trans-p{font-size:14px;color:var(--text2);line-height:1.9;margin-bottom:28px}
.trans-badge{display:inline-block;padding:8px 20px;border-radius:100px;font-size:13px;font-weight:700;margin-bottom:8px}

/* ── Loading ── */
.loading-screen{text-align:center;padding:56px 20px;background:var(--white);border-radius:20px;box-shadow:var(--sh);animation:popIn .4s ease}
.loader{display:inline-block;width:52px;height:52px;border:5px solid var(--blue-l);border-top-color:var(--blue);border-radius:50%;animation:spin .9s linear infinite;margin-bottom:20px}
.loader-stock{border-color:var(--green-l);border-top-color:var(--green)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Result ── */
.result-screen{animation:popIn .4s ease}

/* Hero 2-col */
.result-hero-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:520px){.result-hero-wrap{grid-template-columns:1fr}}
.result-hero{border-radius:18px;padding:24px 20px;position:relative;overflow:hidden}
.rh-cw{background:linear-gradient(135deg,var(--navy),var(--navy2))}
.rh-stock{background:linear-gradient(135deg,#1b5e20,var(--green))}
.rh-label{font-size:10px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.65);margin-bottom:8px}
.rh-type{font-size:17px;font-weight:800;color:#fff;margin-bottom:6px;line-height:1.3}
.rh-genre{font-size:13px;color:rgba(255,255,255,.85);line-height:1.7}
.rh-deco{position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07);pointer-events:none}

/* Score bars */
.score-section{margin-bottom:20px}
.score-section-title{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.score-item{margin-bottom:13px}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.score-label{font-size:13px;font-weight:700;color:var(--navy)}
.score-pct{font-size:12px;font-weight:700}
.score-track{height:9px;background:var(--bg);border-radius:100px;overflow:hidden;border:1px solid var(--border)}
.score-fill{height:100%;border-radius:100px;transition:width 1.1s cubic-bezier(.4,0,.2,1)}

/* CW score colors */
.cw1 .score-fill{background:#3b5bdb} .cw1 .score-pct{color:#3b5bdb}
.cw2 .score-fill{background:#0c8599} .cw2 .score-pct{color:#0c8599}
.cw3 .score-fill{background:#c2255c} .cw3 .score-pct{color:#c2255c}
.cw4 .score-fill{background:#e8590c} .cw4 .score-pct{color:#e8590c}
.cw5 .score-fill{background:#6741d9} .cw5 .score-pct{color:#6741d9}
.cw6 .score-fill{background:#f59f00} .cw6 .score-pct{color:#f59f00}
.cw7 .score-fill{background:#364fc7} .cw7 .score-pct{color:#364fc7}
.cw8 .score-fill{background:#087f5b} .cw8 .score-pct{color:#087f5b}
.cw9 .score-fill{background:#862e9c} .cw9 .score-pct{color:#862e9c}
/* Stock score colors */
.st1 .score-fill{background:#e67700} .st1 .score-pct{color:#e67700}
.st2 .score-fill{background:#0c8599} .st2 .score-pct{color:#0c8599}
.st3 .score-fill{background:#2f9e44} .st3 .score-pct{color:#2f9e44}
.st4 .score-fill{background:#c92a2a} .st4 .score-pct{color:#c92a2a}
.st5 .score-fill{background:#c2255c} .st5 .score-pct{color:#c2255c}
.st6 .score-fill{background:#6741d9} .st6 .score-pct{color:#6741d9}
.st7 .score-fill{background:#e67700} .st7 .score-pct{color:#e67700}

/* Genre card */
.genre-card{border-radius:14px;padding:18px;border:2px solid;margin-bottom:10px}
.tg-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tg-icon{font-size:26px}
.tg-name{font-size:15px;font-weight:700;color:var(--navy)}
.tg-rank{font-size:10px;font-weight:700;color:#fff;background:var(--navy);padding:2px 8px;border-radius:100px}
.tg-desc{font-size:13px;color:var(--text2);line-height:1.75;margin-bottom:10px}
.tg-jobs{display:flex;flex-direction:column;gap:5px}
.tg-job{background:rgba(255,255,255,.65);border-radius:7px;padding:8px 11px;font-size:12px;color:var(--text2);display:flex;gap:7px}
.tg-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tg-tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:100px;background:var(--white);color:var(--text2);border:1px solid var(--border)}

/* Schedule */
.schedule-grid{display:flex;flex-direction:column;gap:0}
.sch-row{display:flex;gap:0;position:relative}
.sch-row:not(:last-child)::before{content:'';position:absolute;left:17px;top:38px;bottom:-2px;width:2px;background:var(--border)}
.sch-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-right:14px;margin-top:2px;z-index:1}
.sch-body{flex:1;padding-bottom:20px}
.sch-period{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;margin-bottom:4px}
.sch-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px}
.sch-tasks{display:flex;flex-direction:column;gap:5px}
.sch-task{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-size:12px;color:var(--text2);line-height:1.6}

/* Checklist */
.cl-item{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;background:var(--bg);border:2px solid var(--border);border-radius:11px;cursor:pointer;transition:all .18s;user-select:none;margin-bottom:8px}
.cl-item.done{background:var(--green-l);border-color:#69db7c}
.cl-checkbox{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .18s;background:var(--white)}
.cl-item.done .cl-checkbox{background:var(--green);border-color:var(--green);color:#fff}
.cl-text{font-size:12px;color:var(--text2);line-height:1.65}
.cl-progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px}
.cl-progress-row span{font-weight:700;color:var(--green)}
.cl-track{height:5px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:14px}
.cl-fill{height:100%;background:linear-gradient(90deg,var(--green),#51cf66);border-radius:100px;transition:width .4s ease}

/* AI advice */
.ai-box{background:var(--blue-l);border:2px solid #a5b4fc;border-radius:13px;padding:18px;font-size:13px;line-height:2;color:var(--text);min-height:60px}
.ai-cursor{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:2px;vertical-align:middle;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Tabs */
.tabs{display:flex;gap:3px;margin-bottom:18px;background:var(--bg);padding:4px;border-radius:11px;border:1px solid var(--border)}
.tab{flex:1;padding:9px 4px;font-size:12px;font-weight:700;border:none;background:none;border-radius:8px;cursor:pointer;color:var(--text3);font-family:'Noto Sans JP',sans-serif;transition:all .18s;text-align:center;line-height:1.4}
.tab.active{background:var(--white);color:var(--navy);box-shadow:var(--sh)}

/* Free input */
.free-input-wrap{margin-top:10px;animation:popIn .25s ease}
.free-input{width:100%;border:2px solid var(--blue-m);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text);font-family:'Noto Sans JP',sans-serif;resize:none;background:var(--white);outline:none;line-height:1.7;transition:border-color .18s}
.free-input:focus{border-color:var(--blue)}
.free-input-label{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:6px}
.career-card{background:var(--white);border-radius:20px;padding:28px;box-shadow:var(--sh);animation:popIn .35s ease}
.career-tag{display:inline-flex;align-items:center;gap:5px;background:var(--blue-l);border:1px solid var(--blue-m);color:var(--navy);border-radius:100px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;margin:3px}
.career-tag:hover{background:var(--blue);color:#fff}
.career-tag.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.career-detected{background:var(--green-l);border:1.5px solid #69db7c;border-radius:10px;padding:10px 14px;font-size:12px;color:var(--green);margin-top:10px;display:none}
/* Encourage */
.enc-box{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:16px;padding:22px;color:#fff;margin-bottom:14px}
.enc-item{background:rgba(255,255,255,.08);border-radius:9px;padding:12px 14px;margin-bottom:9px}
.enc-q{font-size:12px;font-weight:700;color:#ffd43b;margin-bottom:5px}
.enc-a{font-size:12px;color:rgba(255,255,255,.85);line-height:1.75}

/* Buttons */
.btn-primary{display:block;width:100%;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:16px;font-size:16px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .18s;box-shadow:0 4px 16px rgba(59,91,219,.25)}
.btn-primary:hover{background:var(--navy2);transform:translateY(-2px)}
.btn-primary-green{background:var(--green);box-shadow:0 4px 16px rgba(47,158,68,.25)}
.btn-primary-green:hover{background:#1b7a2e}
.btn-secondary{display:block;width:100%;background:var(--white);border:2px solid var(--border);color:var(--text2);border-radius:13px;padding:13px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .18s;text-align:center;margin-top:10px}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}
.q-note{text-align:center;font-size:11px;color:var(--text3);margin-top:10px}
.copy-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:7px;padding:7px 14px;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:12px;transition:all .18s}
.copy-btn:hover{background:rgba(255,255,255,.2)}
.copy-btn.copied{background:var(--green);border-color:var(--green)}
.template-box{background:var(--navy);border-radius:13px;padding:18px}
.template-text{font-size:12px;color:rgba(255,255,255,.88);line-height:2;white-space:pre-wrap}
.template-text .ph{color:#ffd43b;font-weight:700}
.price-row{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:12px 14px;margin-bottom:8px}
.price-phase{font-size:10px;font-weight:700;color:#fff;padding:3px 9px;border-radius:100px;flex-shrink:0;min-width:56px;text-align:center}
.ph-first{background:var(--blue)} .ph-second{background:var(--green)} .ph-third{background:var(--orange)}
.price-val{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:1px}
.price-note{font-size:11px;color:var(--text2)}
</style>
</head>
<body>
<div id="app">
  <div class="site-header">
    <div class="site-logo">🤖 AI MONETIZE LAB</div>
    <div class="site-title"><em>AIマネタイズ</em><br>適性診断 2026</div>
    <p class="site-sub">クライアントワーク × ストック型、あなたに合った<br>収入の作り方を診断で見つけましょう。</p>
  </div>
  <div id="main-content"></div>
</div>

<script>
// ════════════════════════════════════════════════════
// CW QUESTIONS (12問)
// ════════════════════════════════════════════════════
const CW_QS = [
  {id:1,text:"今のあなたの状況に一番近いものは？",hint:"正直に選んでください",opts:[
    {l:"会社員・学生で副業・フリーランスを始めたい",s:{wr:1,sns:1,de:1,img:1,sl:0,web:0,pc:0,en:0,co:0}},
    {l:"退職・休職していて今すぐ収入が必要",s:{wr:2,sns:2,de:1,img:2,sl:0,web:1,pc:1,en:1,co:1}},
    {l:"在宅・リモートで働きたい",s:{wr:2,sns:1,de:1,img:1,sl:1,web:1,pc:1,en:1,co:0}},
    {l:"スキルアップしながら将来独立したい",s:{wr:1,sns:1,de:2,img:2,sl:2,web:2,pc:1,en:2,co:1}},
  ]},
  {id:2,text:"文章を書くことについてどう感じますか？",hint:"LINEやSNSなど日常の文章も含めて考えてください",opts:[
    {l:"好きで、よく書く。読んでもらえると嬉しい",s:{wr:4,sns:2,de:0,img:0,sl:1,web:0,pc:0,en:0,co:2}},
    {l:"得意ではないが練習すれば何とかなりそう",s:{wr:2,sns:1,de:0,img:0,sl:1,web:1,pc:0,en:0,co:1}},

function analyzeCareer(text){
  if(!text||text.trim().length<2) return {};
  const t = text.toLowerCase();
  const bonus = {wr:0,sns:0,de:0,img:0,sl:0,web:0,pc:0,en:0,co:0};
  Object.entries(CAREER_KEYWORDS).forEach(([k,words])=>{
    words.forEach(w=>{if(t.includes(w.toLowerCase())) bonus[k]+=3;});
    if(bonus[k]>6) bonus[k]=6; // cap at +6
  });
  return bonus;
}
function analyzeCareerStock(text){
  if(!text||text.trim().length<2) return {};
  const t = text.toLowerCase();
  const bonus = {ai:0,sf:0,nt:0,yt:0,ig:0,ur:0,af:0};
  Object.entries(STOCK_CAREER_KEYWORDS).forEach(([k,words])=>{
    words.forEach(w=>{if(t.includes(w.toLowerCase())) bonus[k]+=2;});
    if(bonus[k]>4) bonus[k]=4;
  });
  return bonus;
}

function calcCW(){
  const r={wr:0,sns:0,de:0,img:0,sl:0,web:0,pc:0,en:0,co:0};
  st.cwAnswers.forEach(a=>{if(a)Object.keys(r).forEach(k=>{r[k]+=(a.s[k]||0);});});
  // 職歴ボーナス加算
  const cb = analyzeCareer(st.careerText);
  Object.keys(r).forEach(k=>{r[k]+=(cb[k]||0);});
  // Q5自由記入ボーナス
  if(st.freeInputs.q5){const fb=analyzeCareer(st.freeInputs.q5);Object.keys(r).forEach(k=>{r[k]+=(fb[k]||0);});}
  const mx=Math.max(...Object.values(r));
  const n={};
  Object.keys(r).forEach(k=>{n[k]=mx>0?Math.round((r[k]/mx)*100):0;});
  return n;
}
function calcST(){
  const r={ai:0,sf:0,nt:0,yt:0,ig:0,ur:0,af:0};
  st.stAnswers.forEach(a=>{if(a)Object.keys(r).forEach(k=>{r[k]+=(a.s[k]||0);});});
  // 職歴ボーナス加算
  const cb = analyzeCareerStock(st.careerText);
  Object.keys(r).forEach(k=>{r[k]+=(cb[k]||0);});
  const mx=Math.max(...Object.values(r));
  const n={};
  Object.keys(r).forEach(k=>{n[k]=mx>0?Math.round((r[k]/mx)*100):0;});
  return n;
}
function topK(obj,k=3){return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,k).map(([key])=>key);}

function mdHtml(t){
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p style="margin-top:12px">').replace(/\n/g,'<br>');
}
function typewriter(text,id,onDone){
  const el=document.getElementById(id);
  if(!el)return;
  let i=0;
  (function tick(){
    if(i<text.length){el.innerHTML=mdHtml(text.slice(0,i+1))+'<span class="ai-cursor"></span>';i++;setTimeout(tick,15);}
    else{el.innerHTML='<p>'+mdHtml(text)+'</p>';if(onDone)onDone();}
  })();
}

function phaseDots(){
  const total=CW_QS.length+ST_QS.length;
  let d='';
  for(let i=0;i<CW_QS.length;i++){
    const cls=i<st.cwAnswers.filter(Boolean).length?(st.phase==='cw'&&i===st.qIdx?'current':'done'):(st.phase==='cw'&&i===st.qIdx?'current':'');
    d+=`<div class="step-dot ${cls}"></div>`;
  }
  for(let i=0;i<ST_QS.length;i++){
    const ans=st.phase==='stock'||st.phase==='loading'||st.phase==='result';
    const cls=ans?(i<st.stAnswers.filter(Boolean).length?(st.phase==='stock'&&i===st.qIdx?'current-stock':'done-stock'):(st.phase==='stock'&&i===st.qIdx?'current-stock':'')):'';
    d+=`<div class="step-dot ${cls}"></div>`;
  }
  return d;
}

        <div class="step-dots">${phaseDots()}</div>
      </div>
      <div class="q-card">
        <div class="q-section-label">STEP 2 ▸ ストック型マネタイズ診断</div>
        <span class="q-badge q-badge-stock">Q${q.id}</span>
        <div class="q-text">${q.text}</div>
        <div class="q-hint">${q.hint}</div>
        <div class="options">${q.opts.map((o,i)=>`
          <button class="opt ${sel&&sel===o?'sel-stock':''}" onclick="selectST(${i})">
            <span class="opt-letter">${['A','B','C','D'][i]}</span><span>${o.l}</span>
          </button>`).join('')}
        </div>
      </div>
      <div class="nav-row">
        <button class="btn-back" onclick="prevST()">← 戻る</button>
        <button class="btn-next btn-next-stock ${sel?'on':''}" onclick="nextST()">${st.qIdx===ST_QS.length-1?'結果を見る 🎯':'次の質問 →'}</button>
      </div>`;
    return;
  }

  // ── LOADING ──
  if(st.screen==='loading'){
    root.innerHTML=`<div class="loading-screen"><div class="loader"></div><h2>あなただけのロードマップを作成中...</h2><p>CW＋ストック型の結果を統合しています</p></div>`;
    return;
  }

  // ── RESULT ──
  if(st.screen==='result'){
    const cs=st.cwScores, ss=st.stScores;
    const cwTop=st.cwTop, stTop=st.stTop;
    const cwG=CW[cwTop[0]], stG=ST[stTop[0]];

    const cwColorCls=['cw1','cw2','cw3','cw4','cw5','cw6','cw7','cw8','cw9'];
    const stColorCls=['st1','st2','st3','st4','st5','st6','st7'];
    const cwOrder=['wr','sns','de','img','sl','web','pc','en','co'];
    const stOrder=['ai','sf','nt','yt','ig','ur','af'];

    const cwBars=cwTop.map((k,i)=>
      `<div class="score-item ${cwColorCls[i]}"><div class="score-row"><span class="score-label">${CW[k].emoji} ${CW[k].name}</span><span class="score-pct">${cs[k]}%</span></div><div class="score-track"><div class="score-fill" style="width:${cs[k]}%"></div></div></div>`
    ).join('');
    const stBars=stTop.map((k,i)=>
      `<div class="score-item ${stColorCls[i]}"><div class="score-row"><span class="score-label">${ST[k].emoji} ${ST[k].name}</span><span class="score-pct">${ss[k]}%</span></div><div class="score-track"><div class="score-fill" style="width:${ss[k]}%"></div></div></div>`
    ).join('');

    // Genre TOP3 CW
    // Q9の回答からExcelレベルを判定
    const q9ans = st.cwAnswers[8]; // Q9はindex8
    const excelAdvanced = q9ans && q9ans.excelLevel === 'advanced';

    const cwTop3=cwTop.slice(0,3).map((k,i)=>{
      const g=CW[k];
      // PC業務効率化はExcelレベルで案件リストを切り替え
      const jobList = (k==='pc' && !excelAdvanced && g.jobs) ? g.jobs : (k==='pc' && excelAdvanced && g.jobsAdvanced) ? g.jobsAdvanced : g.jobs;
      const tagList = (k==='pc' && !excelAdvanced && g.tags) ? g.tags : (k==='pc' && excelAdvanced && g.tagsAdvanced) ? g.tagsAdvanced : g.tags;
      const jobs=jobList.map(j=>`<div class="tg-job"><span>▸</span><span>${j}</span></div>`).join('');
      const tags=tagList.map(t=>`<span class="tg-tag">${t}</span>`).join('');
      const bgs={'wr':'eef2ff','sns':'e3fafc','de':'fff0f6','img':'fff4e6','sl':'f3f0ff','web':'f3f0ff','pc':'fff9db','en':'fff9db','co':'ebfbee'};
      const bds={'wr':'a5b4fc','sns':'66d9e8','de':'f783ac','img':'ffa94d','sl':'b197fc','web':'b197fc','pc':'ffd43b','en':'ffd43b','co':'69db7c'};
      return `<div class="genre-card" style="background:#${bgs[k]||'f0f2ff'};border-color:#${bds[k]||'dee2e6'}">
        <div class="tg-head"><span class="tg-icon">${g.emoji}</span><span class="tg-name">${g.name}</span><span class="tg-rank">#${i+1}</span></div>
        ${k==='pc'?`<div style="margin-bottom:8px"><span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;${excelAdvanced?'background:#1e3a5f;color:#60a5fa':'background:#1a3320;color:#6ee7b7'}">${excelAdvanced?'⚡ VBA・GAS対応レベル':'📊 Excel関数・データ整理レベル'}</span></div>`:''}
        <div class="tg-desc">${g.intro}${k==='pc'&&!excelAdvanced?' まずはデータ整理・集計補助から始めて、スキルアップしながら単価を上げていきましょう。':''}</div>
        <div class="tg-jobs">${jobs}</div>
        <div class="tg-tags">${tags}</div>
      </div>`;
    }).join('');

    // Stock TOP3
    const stTop3=stTop.slice(0,3).map((k,i)=>{
      const g=ST[k];
      const steps=g.howto.map(s=>`<div class="tg-job"><span>▸</span><span>${s}</span></div>`).join('');
      const bgs2={'ai':'fff4e6','sf':'e3fafc','nt':'ebfbee','yt':'fff5f5','ig':'fff0f6','ur':'f3f0ff','af':'fff9db'};
      const bds2={'ai':'ffa94d','sf':'66d9e8','nt':'69db7c','yt':'ff6b6b','ig':'f783ac','ur':'b197fc','af':'ffd43b'};
      return `<div class="genre-card" style="background:#${bgs2[k]||'f0f2ff'};border-color:#${bds2[k]||'dee2e6'}">
        <div class="tg-head"><span class="tg-icon">${g.emoji}</span><span class="tg-name">${g.name}</span><span class="tg-rank">#${i+1}</span></div>
        <div class="tg-desc">${g.intro}</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px">プラットフォーム：${g.platform}　|　収益化まで：${g.period}</div>
        <div class="tg-jobs">${steps}</div>
      </div>`;
    }).join('');

    // Schedule
    const schColors=['3b5bdb','2f9e44','e8590c','6741d9'];
    const schedule=[
      {period:'今すぐ〜2週目',title:'基盤を整える',dot:schColors[0],tasks:[
        `【CW】ランサーズ・クラウドワークスに両方登録してプロフィールを完成させる`,
        `【CW】${cwG.name}カテゴリで初心者向け案件を10件リストアップする`,
        `【CW】提案文テンプレートを使って3〜5件応募する`,
      ]},
      {period:'2〜4週目',title:'初案件を取りに行く',dot:schColors[1],tasks:[
        `【CW】週5件応募を目標に継続する（不採用でも次へ）`,
        `【ストック】${stG.name}の準備を始める（${stG.howto[0]}）`,
        `【CW】初案件を受注したらヒアリング5問で確認してから着手`,
      ]},
      {period:'1〜2ヶ月目',title:'CW 0→2達成を目指す',dot:schColors[2],tasks:[
        `【CW】2件目を受注してレビューを2件獲得する`,
        `【ストック】${stG.name}を本格化（${stG.howto[1]}）`,
        `【CW】継続案件への移行を提案してみる`,
      ]},
      {period:'2〜3ヶ月目以降',title:'両方で収入を積み上げる',dot:schColors[3],tasks:[
        `【CW】月収3万円を目標に単価を少しずつ上げていく`,
        `【ストック】${stG.name}からの収入が月数千〜1万円になることを目標に`,
        `両方の実績が揃ったら単価交渉・継続顧問への誘導へ`,
      ]},
    ];
    const schHtml=schedule.map((s,i)=>`
      <div class="sch-row">
        <div class="sch-dot" style="background:#${s.dot}">${i+1}</div>
        <div class="sch-body">
          <div class="sch-period">${s.period}</div>
          <div class="sch-title">${s.title}</div>
          <div class="sch-tasks">${s.tasks.map(t=>`<div class="sch-task">${t}</div>`).join('')}</div>
        </div>
      </div>`).join('');

    // Proposal
    // PC業務効率化はExcelレベルで提案文を切り替え
    const rawProposal = (cwTop[0]==='pc' && excelAdvanced && cwG.proposalAdvanced) ? cwG.proposalAdvanced : cwG.proposal;
    const proposalHtml=rawProposal.replace(/\[(.+?)\]/g,'<span class="ph">[$1]</span>');
    // Prices
    const priceHtml=cwG.prices.map(p=>`<div class="price-row"><span class="price-phase ${p.p==='初案件'?'ph-first':p.p==='実績あり'?'ph-second':'ph-third'}">${p.p}</span><div><div class="price-val">${p.v}</div><div class="price-note">${p.n}</div></div></div>`).join('');

    // Encouragement
    const encs=[
      {q:"応募しても全然採用されない…",a:"初心者の採用率は10〜20%が普通です。「5件応募で1件採用」を目標に。採用されない＝あなたがダメなのではなく条件が合わなかっただけです。"},
      {q:"実績・ポートフォリオがなくて応募できない…",a:"架空のサンプル作品でもOK！「練習で作りました」と正直に書いた上でサンプルを添付するだけで採用されることはよくあります。"},
      {q:"ストック型がなかなか売れない…",a:"ストック型は時間がかかるのが普通です。まずCWで収入を確保しながらコツコツ積み上げてください。最初の1件が売れた後は加速します。"},
    ].map(e=>`<div class="enc-item"><div class="enc-q">Q: ${e.q}</div><div class="enc-a">${e.a}</div></div>`).join('');

    root.innerHTML=`
      <div class="result-screen">
        ${(()=>{
          const cb=analyzeCareer(st.careerText);
          const hl={wr:'ライティング',sns:'SNS運用',de:'デザイン',img:'画像生成',sl:'スライド資料',web:'Web制作',pc:'PC業務効率化',en:'エンジニアリング',co:'コンサル'};
          const found=Object.entries(cb).filter(([k,v])=>v>0).map(([k])=>CW[k].emoji+' '+CW[k].name);
          return found.length>0?`<div style="background:var(--green-l);border:1.5px solid #69db7c;border-radius:11px;padding:10px 14px;font-size:12px;color:var(--green);margin-bottom:12px">
            ✅ <strong>職歴・経験から検出されたスキル：</strong>${found.join('　')}
          </div>`:'';
        })()}
        <div class="result-hero-wrap">
          <div class="result-hero rh-cw">
            <div class="rh-deco"></div>
            <div class="rh-label">CW ▸ あなたに向いているジャンル</div>
            <div class="rh-type">${cwG.emoji} ${cwG.name}</div>
            <div class="rh-genre">${cwG.intro.slice(0,45)}…</div>
          </div>
          <div class="result-hero rh-stock">
            <div class="rh-deco"></div>
            <div class="rh-label">ストック型 ▸ あなたに向いている手段</div>
            <div class="rh-type">${stG.emoji} ${stG.name}</div>
            <div class="rh-genre">${stG.intro.slice(0,45)}…</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📊 CWジャンル スコア（上位3位）</div>
          <div class="score-section">${cwBars}</div>
          <div style="height:1px;background:var(--border);margin:16px 0"></div>
          <div class="card-title">📦 ストック型スコア（上位3位）</div>
          <div class="score-section">${stBars}</div>
        </div>

        <div class="card"><div class="card-title">🎯 おすすめCWジャンル TOP3</div>${cwTop3}</div>
        <div class="card"><div class="card-title">📦 おすすめストック手段 TOP3</div>${stTop3}</div>

        <div class="card" style="padding-bottom:8px">
          <div class="tabs">
            <button class="tab active" data-tab="schedule" onclick="switchTab('schedule')">🗺️ スケジュール</button>
            <button class="tab" data-tab="proposal" onclick="switchTab('proposal')">📝 提案文</button>
            <button class="tab" data-tab="price" onclick="switchTab('price')">💴 単価目安</button>
            <button class="tab" data-tab="checklist" onclick="switchTab('checklist')">✅ チェックリスト</button>
          </div>
          <div id="panel-schedule" class="tab-panel">
            <div style="margin-bottom:12px;padding:10px 14px;background:var(--blue-l);border-radius:9px;font-size:12px;color:var(--text2)">
              💡 <strong>CW（${cwG.name}）× ストック（${stG.name}）</strong>の並走スケジュールです
            </div>
            <div class="schedule-grid">${schHtml}</div>
          </div>
          <div id="panel-proposal" class="tab-panel" style="display:none">
            <div style="margin-bottom:10px;font-size:12px;color:var(--text2)"><strong style="color:var(--navy)">[　]の部分だけ</strong>自分の言葉に変えてそのまま使えます。</div>
            <div class="template-box">
              <div class="template-text">${proposalHtml}</div>
              <button class="copy-btn" id="copy-btn" onclick="copyProposal()">📋 テンプレートをコピー</button>
            </div>
          </div>
          <div id="panel-price" class="tab-panel" style="display:none">
            <div style="margin-bottom:12px;font-size:12px;color:var(--text2)">最初は単価より<strong style="color:var(--navy)">「1件完走すること」</strong>が最優先。</div>
            ${priceHtml}
          </div>
          <div id="panel-checklist" class="tab-panel" style="display:none">
            <div id="cl-wrap"></div>
          </div>
        </div>

        <div class="card">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
            <span style="background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px">✨ CWアドバイス</span>
          </div>
          <div class="ai-box" id="ai-cw-text">分析中...</div>
        </div>

        <div class="card">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
            <span style="background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px">✨ ストック型アドバイス</span>
          </div>
          <div class="ai-box" style="border-color:#a3d9a5;background:var(--green-l)" id="ai-st-text">分析中...</div>
        </div>

        <div class="enc-box">
          <div style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px">💪 詰まったときのQ&A</div>
          ${encs}
        </div>

        <button class="btn-secondary" onclick="restart()">🔄 もう一度診断する</button>
      </div>`;

    // Start typewriters
    setTimeout(()=>typewriter(CW_ADVICE[cwTop[0]]||'','ai-cw-text',()=>{
      setTimeout(()=>typewriter(ST_ADVICE[stTop[0]]||'','ai-st-text'),200);
    }),300);
  }
}

// ════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════
function startCW(){st.screen='career';render();}
function startQuizAfterCareer(){st.screen='quiz';st.phase='cw';st.qIdx=0;render();}
function updateCareerText(v){
  st.careerText=v;
  // Show detected keywords
  const detected=[];
  const t=v.toLowerCase();
  const allKw={...CAREER_KEYWORDS};
  const highlights={wr:'ライティング',sns:'SNS運用',de:'デザイン',img:'画像生成',sl:'スライド資料',web:'Web制作',pc:'PC業務効率化',en:'エンジニアリング',co:'コンサル'};
  Object.entries(allKw).forEach(([k,words])=>{
    if(words.some(w=>t.includes(w.toLowerCase()))) detected.push(highlights[k]);
  });
  const el=document.getElementById('career-detected');
  if(el){
    if(detected.length>0){el.textContent='✅ 検出されたスキル：'+detected.join('・');el.style.display='block';}
    else{el.style.display='none';}
  }
}
function updateFreeInput(qKey,v){st.freeInputs[qKey]=v;}

function selectCW(i){
  const opt=CW_QS[st.qIdx].opts[i];
  st.cwAnswers[st.qIdx]=opt;
  render();
  // Q5のその他選択時、既存テキストがあれば復元
  if(opt.freeInput){
    setTimeout(()=>{
      const el=document.getElementById('free-input-q5');
      if(el&&st.freeInputs.q5) el.value=st.freeInputs.q5;
    },50);
  }
}
function prevCW(){if(st.qIdx>0){st.qIdx--;render();}}
function nextCW(){
  if(!st.cwAnswers[st.qIdx])return;
  if(st.qIdx<CW_QS.length-1){st.qIdx++;render();}
  else{st.screen='transition';render();}
}

function startStock(){st.screen='quiz';st.phase='stock';st.qIdx=0;render();}

function selectST(i){st.stAnswers[st.qIdx]=ST_QS[st.qIdx].opts[i];render();}
function prevST(){
  if(st.qIdx>0){st.qIdx--;render();}
  else{st.screen='transition';render();}
}
function nextST(){
  if(!st.stAnswers[st.qIdx])return;
  if(st.qIdx<ST_QS.length-1){st.qIdx++;render();}
  else showResult();
}

function showResult(){
  st.screen='loading';render();
  const cs=calcCW(), ss=calcST();
  st.cwScores=cs; st.stScores=ss;
  st.cwTop=topK(cs,9); st.stTop=topK(ss,7);
  setTimeout(()=>{st.screen='result';render();},1800);
}

function restart(){
  st={screen:'intro',phase:'cw',qIdx:0,cwAnswers:[],stAnswers:[],cwScores:null,stScores:null,cwTop:null,stTop:null,aiCwText:'',aiStText:'',aiDone:false,tab:'schedule',checks:{},careerText:'',freeInputs:{},careerBonus:{}};
  render();
}

render();
</script>
